<script>
// Modo leitura: um botão que esconde as duas barras laterais e centraliza o
// texto. A escolha é lembrada entre páginas (localStorage). Ver o CSS em
// styles.css (classe html.modo-leitura e .btn-modo-leitura).
(function () {
  var CHAVE = "bases3-modo-leitura";

  // 1. Aplicar o estado salvo ANTES do primeiro paint, para não haver flash das
  //    barras aparecendo e sumindo. Este script está no <head>, então roda antes
  //    de o <body> ser desenhado.
  try {
    if (localStorage.getItem(CHAVE) === "1") {
      document.documentElement.classList.add("modo-leitura");
    }
  } catch (e) {}

  // 2. Injetar o botão e ligar o toggle quando o DOM estiver pronto.
  document.addEventListener("DOMContentLoaded", function () {
    var btn = document.createElement("button");
    btn.className = "btn-modo-leitura";
    btn.type = "button";

    function rotular() {
      var ativo = document.documentElement.classList.contains("modo-leitura");
      btn.innerHTML = ativo
        ? '<i class="bi bi-layout-sidebar-inset"></i> Mostrar menus'
        : '<i class="bi bi-arrows-angle-expand"></i> Modo leitura';
      btn.setAttribute("aria-pressed", ativo ? "true" : "false");
    }

    rotular();

    btn.addEventListener("click", function () {
      var ativo = document.documentElement.classList.toggle("modo-leitura");
      try {
        localStorage.setItem(CHAVE, ativo ? "1" : "0");
      } catch (e) {}
      rotular();
    });

    document.body.appendChild(btn);
  });
})();
</script>
